version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dunab-postgres
    environment:
      POSTGRES_DB: dunab_db
      POSTGRES_USER: dunab_user
      POSTGRES_PASSWORD: dunab_pass
    ports:
      - "5432:5432"
    volumes:
      - dunab_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dunab_user -d dunab_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dunab_pgdata:
    name: dunab_pgdata
