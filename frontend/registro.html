<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DUNAB — Crear Cuenta</title>
  <script>
    (function(){
      try {
        var t = localStorage.getItem('dunab_theme') || 'CLARO';
        if (t === 'OSCURO') document.documentElement.setAttribute('data-theme','dark');
      } catch(e){}
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/dunab-theme.css"/>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      min-height: 100vh;
    }

    .auth-container {
      width: 100%; max-width: 640px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      box-shadow: var(--card-shadow-lg);
      overflow: hidden;
    }

    /* ── Cabecera con gradiente ── */
    .form-header {
      background: linear-gradient(135deg, var(--unab-red) 0%, var(--unab-red-dark) 100%);
      padding: 26px 36px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
      overflow: hidden;
    }
    .form-header::after {
      content: '';
      position: absolute; right: -50px; top: -50px;
      width: 180px; height: 180px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .form-header::before {
      content: '';
      position: absolute; left: -30px; bottom: -40px;
      width: 140px; height: 140px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .form-header-logo {
      background: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      position: relative; z-index: 2;
      flex-shrink: 0;
    }
    .form-header-text { position: relative; z-index: 2; }
    .form-header h1 { font-size: 20px; font-weight: 700; }
    .form-header p  { font-size: 12.5px; opacity: .85; margin-top: 3px; }

    /* ── Cuerpo del formulario ── */
    .form-body { padding: 30px 36px 36px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 18px;
    }
    .full-width { grid-column: 1 / -1; }

    /* Sección de etiqueta */
    .section-label {
      font-size: 10.5px; font-weight: 700;
      color: var(--unab-red);
      text-transform: uppercase; letter-spacing: 1px;
      margin: 14px 0 10px;
      padding-bottom: 7px;
      border-bottom: 1.5px solid var(--unab-red-soft);
      grid-column: 1 / -1;
    }

    /* Fuerza de contraseña */
    .pwd-strength { margin-top: 6px; }
    .strength-bar { height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width .3s, background .3s; }
    .strength-label { font-size: 11.5px; color: var(--text-secondary); margin-top: 3px; }

    /* Alerta de error */
    .alert-error {
      background: var(--red-neg-soft);
      border: 1px solid rgba(239,68,68,0.25);
      color: var(--red-neg-dark);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .login-link {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .login-link a {
      color: var(--unab-red);
      font-weight: 600;
      text-decoration: none;
    }
    .login-link a:hover { text-decoration: underline; }

    .float-theme {
      position: fixed; top: 18px; right: 18px;
      z-index: 50; border-radius: 12px !important;
    }

    @media (max-width: 540px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-body, .form-header { padding-left: 22px; padding-right: 22px; }
    }
  </style>
</head>
<body>

<button class="icon-btn theme-toggle float-theme" type="button"
        title="Cambiar tema claro / oscuro" onclick="ThemeManager.toggle()">
  <svg class="icon-sun" fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4
             M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
  </svg>
  <svg class="icon-moon" fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>

<div class="auth-container">
  <div class="form-header">
    <div class="form-header-logo" id="headerLogo"></div>
    <div class="form-header-text">
      <h1>Crear cuenta DUNAB</h1>
      <p>Universidad Autónoma de Bucaramanga</p>
    </div>
  </div>

  <div class="form-body">
    <div class="alert-error" id="alertError"></div>

    <form id="registerForm" novalidate>
      <div class="form-grid">

        <div class="section-label">Información personal</div>

        <div class="field full-width">
          <label for="nombre">Nombre completo *</label>
          <input type="text" id="nombre" placeholder="Ej: María Rodríguez"
                 required maxlength="120"/>
          <div class="field-error" id="errNombre" style="display:none">Mínimo 3 caracteres.</div>
        </div>

        <div class="field">
          <label for="correo">Correo institucional *</label>
          <input type="email" id="correo" placeholder="usuario@unab.edu.co" required/>
          <div class="field-error" id="errCorreo" style="display:none">Correo inválido.</div>
        </div>

        <div class="field">
          <label for="codigo">Código estudiantil *</label>
          <input type="text" id="codigo" placeholder="Ej: 20231234"
                 required maxlength="20"/>
          <div class="field-error" id="errCodigo" style="display:none">Código requerido.</div>
        </div>

        <div class="field">
          <label for="cedula">Cédula</label>
          <input type="text" id="cedula" placeholder="Número de documento" maxlength="30"/>
        </div>

        <div class="field">
          <label for="celular">Celular</label>
          <input type="tel" id="celular" placeholder="Ej: 3001234567" maxlength="20"/>
        </div>

        <div class="section-label">Información académica</div>

        <div class="field full-width">
          <label for="facultad">Facultad</label>
          <select id="facultad">
            <option value="Facultad de Ciencias Jurídicas y Políticas" selected>Ciencias Jurídicas y Políticas</option>
            <option value="Facultad de Ciencias Económicas y Administrativas">Ciencias Económicas y Administrativas</option>
            <option value="Facultad de Ingenierías">Ingenierías</option>
            <option value="Facultad de Ciencias de la Salud">Ciencias de la Salud</option>
            <option value="Facultad de Ciencias Sociales, Humanidades y Artes">Ciencias Sociales, Humanidades y Artes</option>
            <option value="Facultad de Ciencias Exactas, Naturales y Agropecuarias">Ciencias Exactas, Naturales y Agropecuarias</option>
          </select>
        </div>

        <div class="field">
          <label for="carrera">Carrera</label>
          <input type="text" id="carrera" placeholder="Ej: Derecho" maxlength="100"/>
        </div>

        <div class="field">
          <label for="semestre">Semestre</label>
          <select id="semestre">
            <option value="1">1°</option><option value="2">2°</option>
            <option value="3">3°</option><option value="4">4°</option>
            <option value="5">5°</option><option value="6">6°</option>
            <option value="7">7°</option><option value="8">8°</option>
            <option value="9">9°</option><option value="10">10°</option>
          </select>
        </div>

        <div class="section-label">Seguridad</div>

        <div class="field full-width">
          <label for="contrasena">Contraseña *</label>
          <input type="password" id="contrasena" placeholder="Mínimo 8 caracteres"
                 required minlength="8" oninput="checkStrength()"/>
          <div class="pwd-strength">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <div class="strength-label" id="strengthLabel">Ingresa una contraseña</div>
          </div>
          <div class="field-error" id="errContrasena" style="display:none">Mínimo 8 caracteres.</div>
        </div>

        <div class="field full-width">
          <label for="confirmar">Confirmar contraseña *</label>
          <input type="password" id="confirmar" placeholder="Repite la contraseña"
                 required oninput="checkMatch()"/>
          <div class="field-error" id="errConfirmar" style="display:none">Las contraseñas no coinciden.</div>
        </div>

      </div><!-- .form-grid -->

      <button type="submit" class="btn btn-primary btn-lg btn-block"
              id="btnRegister" style="margin-top:10px">
        Crear mi cuenta
      </button>
    </form>

    <div class="login-link">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/theme.js"></script>
<script>
  document.getElementById('headerLogo').innerHTML = dunabLogoSVG({ width: 160 });

  if (Auth.isLoggedIn()) window.location.replace('dashboard.html');

  function checkStrength() {
    const pwd   = document.getElementById('contrasena').value;
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let score = 0;
    if (pwd.length >= 8)           score++;
    if (/[A-Z]/.test(pwd))         score++;
    if (/[0-9]/.test(pwd))         score++;
    if (/[^A-Za-z0-9]/.test(pwd))  score++;
    const configs = [
      { pct: '0%',   color: 'transparent', text: 'Ingresa una contraseña' },
      { pct: '25%',  color: '#ef4444',     text: 'Muy débil' },
      { pct: '50%',  color: '#f59e0b',     text: 'Débil' },
      { pct: '75%',  color: '#3b82f6',     text: 'Buena' },
      { pct: '100%', color: '#22c55e',     text: 'Excelente' }
    ];
    const cfg = configs[score];
    fill.style.width      = cfg.pct;
    fill.style.background = cfg.color;
    label.textContent     = cfg.text;
    label.style.color     = cfg.color === 'transparent' ? '' : cfg.color;
  }

  function checkMatch() {
    const pwd  = document.getElementById('contrasena').value;
    const conf = document.getElementById('confirmar').value;
    const err  = document.getElementById('errConfirmar');
    if (conf && pwd !== conf) err.style.display = 'block';
    else                       err.style.display = 'none';
  }

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn     = document.getElementById('btnRegister');
    const alertEl = document.getElementById('alertError');
    let valid = true;

    const v = (id, condition, errId) => {
      const el  = document.getElementById(id);
      const err = document.getElementById(errId);
      if (!condition(el.value)) { err.style.display = 'block'; valid = false; }
      else                       { err.style.display = 'none'; }
    };
    v('nombre',     val => val.trim().length >= 3,                  'errNombre');
    v('correo',     val => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val), 'errCorreo');
    v('codigo',     val => val.trim().length >= 2,                  'errCodigo');
    v('contrasena', val => val.length >= 8,                         'errContrasena');

    const pwd  = document.getElementById('contrasena').value;
    const conf = document.getElementById('confirmar').value;
    if (pwd !== conf) { document.getElementById('errConfirmar').style.display = 'block'; valid = false; }
    if (!valid) return;

    btn.disabled    = true;
    btn.textContent = 'Creando cuenta…';
    alertEl.style.display = 'none';

    const payload = {
      nombre:     document.getElementById('nombre').value.trim(),
      correo:     document.getElementById('correo').value.trim(),
      contrasena: pwd,
      codigo:     document.getElementById('codigo').value.trim(),
      cedula:     document.getElementById('cedula').value.trim()   || null,
      celular:    document.getElementById('celular').value.trim()  || null,
      facultad:   document.getElementById('facultad').value,
      carrera:    document.getElementById('carrera').value.trim()  || null,
      semestre:   parseInt(document.getElementById('semestre').value)
    };

    try {
      await AuthAPI.register(payload);
      window.location.replace('dashboard.html');
    } catch (err) {
      alertEl.textContent  = err.message || 'Error al crear la cuenta.';
      alertEl.style.display = 'block';
      btn.disabled    = false;
      btn.textContent = 'Crear mi cuenta';
    }
  });
</script>
</body>
</html>
