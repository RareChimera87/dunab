# ═══════════════════════════════════════════════════════════
#  DUNAB – Perfil de desarrollo con H2 (sin necesidad de PostgreSQL)
#  Activar con: mvn spring-boot:run -Dspring.profiles.active=dev
# ═══════════════════════════════════════════════════════════

# ── H2 en memoria ─────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:dunab_dev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=true
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── Flyway desactivado (H2 usa create-drop) ───────────────
spring.flyway.enabled=false

# ── Consola H2 (http://localhost:8080/api/h2-console) ────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Logging más detallado en dev ─────────────────────────
logging.level.com.unab.dunab=DEBUG
logging.level.org.springframework.security=DEBUG
