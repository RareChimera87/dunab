# ═══════════════════════════════════════════
#  DUNAB – Configuración de la aplicación
# ═══════════════════════════════════════════

spring.application.name=dunab

# ── Servidor ──────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── PostgreSQL ────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/dunab_db
spring.datasource.username=dunab_user
spring.datasource.password=dunab_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT ───────────────────────────────────
# Clave secreta base64 (cambia en producción por una de al menos 256 bits)
dunab.jwt.secret=ZHVuYWJfc2VjcmV0X2tleV9wYXJhX2p3dF90b2tlbnNfc2VndXJvcw==
dunab.jwt.expiration-ms=86400000

# ── CORS ──────────────────────────────────
dunab.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,null

# ── OpenAPI / Swagger ─────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Logging ───────────────────────────────
logging.level.com.unab.dunab=INFO
logging.level.org.springframework.security=WARN
